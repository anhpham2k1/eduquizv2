# /etc/nginx/sites-available/eduquiz.anhpt.online
# Symlink: ln -s /etc/nginx/sites-available/eduquiz.anhpt.online /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name eduquiz.anhpt.online;

    # Redirect HTTP -> HTTPS (bật sau khi có cert)
    # return 301 https://$host$request_uri;

    # ── Tạm dùng HTTP trước khi có SSL ──
    include /etc/nginx/snippets/eduquiz-locations.conf;
}

